<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A2 (a square) Properties Pvt. Ltd. - Login</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body{
            background: linear-gradient(135deg,#0f4c81,#1f8ac0,#4bb6e8);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            font-family:'Segoe UI',sans-serif;
        }

        .login-card{
            width:100%;
            max-width:420px;
            border:none;
            border-radius:18px;
            overflow:hidden;
            box-shadow:0 15px 35px rgba(0,0,0,.25);
            background:#fff;
        }

        .logo-box{
            width:90px;
            height:90px;
            background:#0d6efd;
            color:#fff;
            font-size:38px;
            font-weight:bold;
            display:flex;
            align-items:center;
            justify-content:center;
            border-radius:15px;
            margin:auto;
            box-shadow:0 8px 20px rgba(13,110,253,.4);
        }

        .company{
            font-size:24px;
            font-weight:700;
            color:#0d6efd;
        }

        .subtitle{
            color:#777;
            font-size:14px;
        }

        .form-control{
            height:48px;
            border-radius:10px;
        }

        .btn-login{
            height:48px;
            border-radius:10px;
            font-weight:600;
            font-size:17px;
        }

        .card-body{
            padding:40px;
        }

        .footer-text{
            font-size:13px;
            color:#888;
        }

        .input-group-text{
            background:#fff;
        }

        a{
            text-decoration:none;
        }
    </style>
</head>

<body>

<div class="card login-card">

    <div class="card-body">

        <div class="text-center mb-4">

            <div class="logo-box">
                A²
            </div>

            <h3 class="company mt-3">
                A2 (a square)
            </h3>

            <h6 class="fw-semibold">
                Properties Pvt. Ltd.
            </h6>

            <p class="subtitle">
                Sign in to continue
            </p>

        </div>

        <form>

            <div class="mb-3">
                <label class="form-label">Email Address</label>

                <div class="input-group">
                    <span class="input-group-text">
                        <i class="bi bi-envelope-fill"></i>
                    </span>

                    <input
                        type="email"
                        class="form-control"
                        placeholder="Enter your email"
                        required>
                </div>
            </div>

            <div class="mb-3">

                <label class="form-label">Password</label>

                <div class="input-group">

                    <span class="input-group-text">
                        <i class="bi bi-lock-fill"></i>
                    </span>

                    <input
                        type="password"
                        class="form-control"
                        placeholder="Enter your password"
                        required>

                </div>

            </div>

            <div class="d-flex justify-content-between mb-4">

                <div class="form-check">

                    <input class="form-check-input" type="checkbox">

                    <label class="form-check-label">
                        Remember Me
                    </label>

                </div>

                <a href="#">Forgot Password?</a>

            </div>

            <button class="btn btn-primary btn-login w-100">
                <i class="bi bi-box-arrow-in-right"></i>
                Login
            </button>

        </form>

        <hr>

        <div class="text-center">

            <small class="footer-text">
                © 2026 A2 (a square) Properties Pvt. Ltd.<br>
                All Rights Reserved.
            </small>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
